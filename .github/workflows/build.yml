name: Build Application

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: folder-sorter-cli-macOS
            binary_name: folder-sorter
          - os: windows-latest
            artifact_name: folder-sorter-cli-Windows
            binary_name: folder-sorter.exe
          - os: ubuntu-latest
            artifact_name: folder-sorter-cli-Linux
            binary_name: folder-sorter

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI Binary
        run: cargo build --release --manifest-path cli/Cargo.toml

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: cli/target/release/${{ matrix.binary_name }}
          if-no-files-found: error

  build-tauri:
    name: Build Tauri GUI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
          - os: windows-latest
          - os: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tauri-gui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: |
          cd tauri-gui
          npm ci

      - name: Build Tauri App
        run: |
          cd tauri-gui
          npm run tauri build
