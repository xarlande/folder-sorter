name: Build Application

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: folder-sorter-cli-macOS
            binary_name: folder-sorter
          - os: windows-latest
            artifact_name: folder-sorter-cli-Windows
            binary_name: folder-sorter.exe
          - os: ubuntu-latest
            artifact_name: folder-sorter-cli-Linux
            binary_name: folder-sorter

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI Binary
        run: cargo build --release -p folder-sorter

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/release/${{ matrix.binary_name }}
          if-no-files-found: error

      - name: Release CLI Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/release/${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    name: Build Tauri GUI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: folder-sorter-gui-macOS
            bundle_path: |
              target/release/bundle/dmg/*.dmg
              tauri-gui/src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            artifact_name: folder-sorter-gui-Windows
            bundle_path: |
              target/release/bundle/nsis/*.exe
              tauri-gui/src-tauri/target/release/bundle/nsis/*.exe
          - os: ubuntu-latest
            artifact_name: folder-sorter-gui-Linux
            bundle_path: |
              target/release/bundle/appimage/*.AppImage
              tauri-gui/src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: tauri-gui/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: |
          cd tauri-gui
          pnpm install

      - name: Build Tauri App
        run: |
          cd tauri-gui
          pnpm tauri build

      - name: Upload Tauri GUI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_path }}
          if-no-files-found: error

      - name: Release Tauri GUI Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.bundle_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
